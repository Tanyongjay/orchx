name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Each step is its own job so each can carry its own status
  # badge in the README. The test job additionally runs the
  # smoke plan+deploy against the mock to verify the CLI end
  # to end.

  name-gate:
    name: Vendor name gate
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run vendor name gate
        run: python scripts/check_vendor_names.py

  lint:
    name: ruff check + format
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (dev extras)
        run: uv sync --extra dev

      - name: ruff check
        run: |
          . .venv/bin/activate
          ruff check src tests

      - name: ruff format --check
        run: |
          . .venv/bin/activate
          ruff format --check src tests

  tests:
    name: pytest (81 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (dev extras)
        run: uv sync --extra dev

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest -v

      - name: Smoke plan and deploy against mock
        run: |
          . .venv/bin/activate
          set +e   # the chaos run below is *expected* to exit non-zero
          orchx plan descriptors/sample_webapp_erp.yaml
          orchx deploy descriptors/sample_webapp_erp.yaml \
              --target mock://local --no-rollback
          # Inject a package-action failure; the deploy MUST roll
          # back the prior OK steps and exit 1. The exit code is
          # not a regression — it is the locked-in contract from
          # commit 51bc00c.
          orchx deploy descriptors/sample_webapp_erp.yaml \
              --target mock://local \
              --chaos '{"local":[{"action":"package","exit_code":1,"fail_times":99}]}'
          chaos_rc=$?
          set -e
          if [ "$chaos_rc" -ne 1 ]; then
            echo "expected chaos deploy to exit with 1, got $chaos_rc"
            exit 1
          fi
          echo "chaos deploy exited with $chaos_rc as expected"